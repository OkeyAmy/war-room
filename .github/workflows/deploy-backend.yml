name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: false
        default: 'Manual trigger'

env:
  PROJECT_ID: war-room-production
  REGION: us-central1
  SERVICE_NAME: war-room-backend
  IMAGE: gcr.io/war-room-production/war-room-backend

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            ./backend

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --memory=1Gi \
            --cpu=2 \
            --timeout=3600 \
            --concurrency=80 \
            --min-instances=0 \
            --max-instances=10 \
            --set-env-vars="ENVIRONMENT=production,GCP_PROJECT_ID=${{ env.PROJECT_ID }}" \
            --set-secrets="GOOGLE_API_KEY=war-room-google-api-key:latest,GEMINI_API_KEY=war-room-google-api-key:latest,ELEVENLABS_API_KEY=war-room-elevenlabs-api-key:latest,LIVEKIT_URL=war-room-livekit-url:latest,LIVEKIT_API_KEY=war-room-livekit-api-key:latest,LIVEKIT_API_SECRET=war-room-livekit-api-secret:latest" \
            --project=${{ env.PROJECT_ID }}

      - name: Get service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format='value(status.url)')
          echo "✅ Deployed: $URL"
          echo "🏥 Health: $URL/api/health"
          echo "SERVICE_URL=$URL" >> $GITHUB_ENV

      - name: Smoke test
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/api/health" || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Health check passed (HTTP $STATUS)"
          else
            echo "⚠️  Health check returned HTTP $STATUS — check Cloud Run logs"
          fi
